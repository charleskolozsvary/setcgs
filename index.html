<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set Card Game Solver</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- Pyodide -->
  <script src="https://cdn.jsdelivr.net/pyodide/v0.27.3/full/pyodide.js"></script>
</head>
<body>

  <main>
    <header>
      <div class="logo">
        <span class="logo-bracket">[</span>
        <span class="logo-text">setcgs</span>
        <span class="logo-bracket">]</span>
      </div>
      <p class="tagline">Solve the card game <em>Set</em> · powered by Pyodide</p>
    </header>

    <!-- Status bar -->
    <div class="status-bar" id="statusBar">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Initialising Pyodide runtime...</span>
    </div>

    <!-- Upload zone -->
    <section class="upload-section" id="uploadSection">
      <label class="drop-zone" id="dropZone" for="fileInput">
        <div class="drop-icon">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <rect x="1" y="1" width="38" height="38" rx="3" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 3"/>
            <path d="M20 28V14M20 14L14 20M20 14L26 20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <p class="drop-label">Drop an image here</p>
        <p class="drop-sub">or <span class="link">click to browse</span></p>
        <input type="file" id="fileInput" accept="image/*" hidden />
      </label>

      <div class="preview-row" id="previewRow" hidden>
        <img id="previewImg" class="thumb" alt="Input preview" />
        <div class="preview-meta" id="previewMeta"></div>
      </div>

      <button class="run-btn" id="runBtn" disabled>
        <span class="run-label">Identify sets</span>
        <span class="run-arrow">→</span>
      </button>
    </section>

    <!-- Output gallery -->
    <!-- Labels -->
    <section class="output-section" id="outputLabels" hidden>
      <h1 class="section-title">Labeled Cards</h1>
      <div class="gallery" id="galleryLabels"></div>
    </section>

    <!-- Sets -->
    <section class="output-section" id="outputSets" hidden>
      <h1 class="section-title">Sets <span id="setCount"></span></h1>
      <div class="gallery" id="gallerySets"></div>
    </section>    

    <!-- Python error display -->
    <div class="error-box" id="errorBox" hidden>
      <p class="error-title">Python error</p>
      <pre id="errorText"></pre>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
